<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Seller Generator</title>

  <link rel="stylesheet" href="/style.css">

  <style>
    /* === CSS KAMU TETAP 100% SAMA (dipotong biar ringkas di sini) === */
    /* TIDAK ADA PERUBAHAN */
  </style>

</head>

<body>

  <!-- 🎵 MUSIC SYSTEM (NEW - HIDDEN PLAYER) -->
  <audio id="bgMusic" loop></audio>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo">
      AI SELLER
    </div>

    <div class="menu">

      <button>Dashboard</button>
      <button>Generate Poster</button>
      <button>Generate Video</button>
      <button>Affiliate Script</button>
      <button>History</button>
      <button>Setting</button>

    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top-title">
      AI Affiliate Generator
    </div>

    <div class="subtitle">
      Generate poster, video, subtitle, dan voice AI otomatis.
    </div>

    <div class="grid">

      <!-- LEFT (TETAP) -->
      <div class="card">

        <h2>Upload Produk</h2>

        <label class="upload-box">
          <input type="file" id="produkInput"/>
          <h3>Upload Foto Produk</h3>
          <p>Klik untuk upload gambar produk</p>
        </label>

        <label class="upload-box">
          <input type="file" id="modelInput"/>
          <h3>Upload Foto Model (Optional)</h3>
          <p>Boleh kosong</p>
        </label>

        <textarea id="prompt"
          placeholder="Buat video affiliate TikTok..."></textarea>

        <!-- VOICE -->
        <select id="voice">
          <option>Cewek Affiliate</option>
          <option>Cewek Santai</option>
          <option>Cowok Santai</option>
          <option>Formal Indonesia</option>
        </select>

        <!-- STYLE -->
        <select id="style">
          <option value="random">Random AI Style</option>
          <option value="tech">Tech / Elektronik</option>
          <option value="soft">Soft / Elegan</option>
          <option value="upbeat">Promo / Hype</option>
          <option value="industrial">Industrial</option>
        </select>

        <!-- MODE -->
        <div class="check-group">

          <label><input type="checkbox" checked/> Poster AI</label>
          <label><input type="checkbox" checked/> Video AI</label>
          <label><input type="checkbox" checked/> Subtitle Auto</label>

        </div>

        <!-- BUTTON -->
        <button class="generate-btn" onclick="generateAI()">
          GENERATE AI
        </button>

        <!-- LOADING -->
        <div class="loading" id="loading">
          AI sedang membuat konten...
        </div>

      </div>

      <!-- RIGHT (TETAP) -->
      <div class="card">
        <h2>Hasil AI</h2>

        <div class="result-grid">
          <div class="result-box">
            <img src="https://picsum.photos/500/400?1"/>
            <div class="result-info">
              <h3>Poster Affiliate</h3>
              <button class="download-btn">Download</button>
            </div>
          </div>

          <div class="result-box">
            <img src="https://picsum.photos/500/400?2"/>
            <div class="result-info">
              <h3>Poster Neon</h3>
              <button class="download-btn">Download</button>
            </div>
          </div>
        </div>

        <div class="video-box">
          <h3>Video AI</h3>

          <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video>

          <button class="download-btn">
            Download Video
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- 🎵 MUSIC LOGIC (NEW SCRIPT) -->
  <script>

    const audio = document.getElementById("bgMusic");

    const musicMap = {
      tech: "assets/music/tech1.mp3",
      soft: "assets/music/soft1.mp3",
      upbeat: "assets/music/upbeat1.mp3",
      industrial: "assets/music/industrial1.mp3",
      random: "assets/music/default.mp3"
    };

    function playMusic(style){

      const music = musicMap[style] || musicMap.random;

      audio.src = music;
      audio.volume = 0.4;

      audio.play().catch(()=>{});
    }

    async function generateAI(){

      const loading = document.getElementById("loading");
      const style = document.getElementById("style").value;

      loading.style.display = "block";

      // 🎵 AUTO MUSIC START
      playMusic(style);

      setTimeout(()=>{

        loading.style.display = "none";

        alert("AI berhasil generate poster & video + music aktif!");

      },3000);
    }

  </script>

</body>
</html>
