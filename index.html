<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Seller Generator</title>

  <link rel="stylesheet" href="style.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
    }

    /* SIDEBAR */

    .sidebar{
      width:260px;
      background:#111827;
      padding:25px;
      border-right:1px solid #1f2937;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      margin-bottom:40px;
      color:#60a5fa;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu button{
      padding:14px;
      border:none;
      border-radius:12px;
      background:#1e293b;
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
    }

    .menu button:hover{
      background:#2563eb;
    }

    /* MAIN */

    .main{
      flex:1;
      padding:30px;
      overflow:auto;
    }

    .top-title{
      font-size:32px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .subtitle{
      color:#94a3b8;
      margin-bottom:30px;
    }

    /* GRID */

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .card{
      background:#111827;
      border-radius:20px;
      padding:25px;
      border:1px solid #1f2937;
    }

    .card h2{
      margin-bottom:20px;
      font-size:22px;
    }

    /* UPLOAD */

    .upload-box{
      border:2px dashed #334155;
      border-radius:15px;
      padding:30px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
      margin-bottom:20px;
    }

    .upload-box:hover{
      border-color:#60a5fa;
      background:#1e293b;
    }

    input[type="file"]{
      display:none;
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:15px;
      padding:15px;
      resize:none;
      background:#1e293b;
      color:white;
      margin-top:15px;
      font-size:15px;
    }

    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      margin-top:15px;
      background:#1e293b;
      color:white;
      font-size:15px;
    }

    .check-group{
      margin-top:20px;
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .check-group label{
      background:#1e293b;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
    }

    /* BUTTON */

    .generate-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:15px;
      margin-top:25px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    .generate-btn:hover{
      transform:scale(1.02);
    }

    /* RESULT */

    .result-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    .result-box{
      background:#1e293b;
      border-radius:15px;
      overflow:hidden;
      border:1px solid #334155;
    }

    .result-box img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .result-info{
      padding:15px;
    }

    .download-btn{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    /* VIDEO */

    .video-box{
      margin-top:20px;
      background:#1e293b;
      border-radius:15px;
      padding:20px;
    }

    video{
      width:100%;
      border-radius:15px;
      margin-top:15px;
    }

    /* LOADING */

    .loading{
      display:none;
      margin-top:20px;
      text-align:center;
      color:#60a5fa;
      font-size:18px;
    }

    /* MOBILE */

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .result-grid{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>
<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      AI SELLER
    </div>

    <div class="menu">

      <button>Dashboard</button>
      <button>Generate Poster</button>
      <button>Generate Video</button>
      <button>Affiliate Script</button>
      <button>History</button>
      <button>Setting</button>

    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="top-title">
      AI Affiliate Generator
    </div>

    <div class="subtitle">
      Generate poster, video, subtitle, dan voice AI otomatis.
    </div>

    <div class="grid">

      <!-- LEFT -->

      <div class="card">

        <h2>Upload Produk</h2>

        <label class="upload-box">

          <input type="file" id="produkInput"/>

          <h3>Upload Foto Produk</h3>
          <p>Klik untuk upload gambar produk</p>

        </label>

        <label class="upload-box">

          <input type="file" id="modelInput"/>

          <h3>Upload Foto Model (Optional)</h3>
          <p>Boleh kosong</p>

        </label>

        <textarea id="prompt"
          placeholder="Contoh:
Buat video affiliate TikTok neon modern dengan subtitle otomatis..."></textarea>

        <!-- VOICE -->

        <select id="voice">

          <option>Cewek Affiliate</option>
          <option>Cewek Santai</option>
          <option>Cowok Santai</option>
          <option>Formal Indonesia</option>

        </select>

        <!-- STYLE -->

        <select id="style">

          <option>Random AI Style</option>
          <option>TikTok Affiliate</option>
          <option>Elegant</option>
          <option>Neon Cyber</option>
          <option>Cinematic</option>

        </select>

        <!-- MODE -->

        <div class="check-group">

          <label>
            <input type="checkbox" checked/>
            Poster AI
          </label>

          <label>
            <input type="checkbox" checked/>
            Video AI
          </label>

          <label>
            <input type="checkbox" checked/>
            Subtitle Auto
          </label>

        </div>

        <!-- BUTTON -->

        <button class="generate-btn" onclick="generateAI()">
          GENERATE AI
        </button>

        <!-- LOADING -->

        <div class="loading" id="loading">
          AI sedang membuat konten...
        </div>

      </div>

      <!-- RIGHT -->

      <div class="card">

        <h2>Hasil AI</h2>

        <!-- POSTER RESULT -->

        <div class="result-grid">

          <div class="result-box">

            <img src="https://picsum.photos/500/400?1"/>

            <div class="result-info">

              <h3>Poster Affiliate</h3>

              <button class="download-btn">
                Download
              </button>

            </div>

          </div>

          <div class="result-box">

            <img src="https://picsum.photos/500/400?2"/>

            <div class="result-info">

              <h3>Poster Neon</h3>

              <button class="download-btn">
                Download
              </button>

            </div>

          </div>

        </div>

        <!-- VIDEO -->

        <div class="video-box">

          <h3>Video AI</h3>

          <video controls>

            <source
              src="https://www.w3schools.com/html/mov_bbb.mp4"
              type="video/mp4">

          </video>

          <button class="download-btn">
            Download Video
          </button>

        </div>

      </div>

    </div>

  </div>

  <script>

    async function generateAI(){

      const loading = document.getElementById("loading");

      loading.style.display = "block";

      setTimeout(()=>{

        loading.style.display = "none";

        alert("AI berhasil generate poster & video!");

      },3000);

    }

  </script>

</body>
</html>
