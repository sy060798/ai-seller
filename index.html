<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Seller Generator</title>

  <link rel="stylesheet" href="style.css"/>

  <style>
    /* === (SEMUA CSS KAMU TETAP) === */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
    }

    .sidebar{width:260px;background:#111827;padding:25px;border-right:1px solid #1f2937;}
    .logo{font-size:28px;font-weight:bold;margin-bottom:40px;color:#60a5fa;}
    .menu{display:flex;flex-direction:column;gap:15px;}
    .menu button{padding:14px;border:none;border-radius:12px;background:#1e293b;color:white;cursor:pointer;}
    .menu button:hover{background:#2563eb;}

    .main{flex:1;padding:30px;overflow:auto;}
    .top-title{font-size:32px;font-weight:bold;margin-bottom:10px;}
    .subtitle{color:#94a3b8;margin-bottom:30px;}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:25px;}
    .card{background:#111827;border-radius:20px;padding:25px;border:1px solid #1f2937;}

    .upload-box{border:2px dashed #334155;border-radius:15px;padding:30px;text-align:center;cursor:pointer;margin-bottom:20px;}

    textarea{width:100%;height:120px;border:none;border-radius:15px;padding:15px;background:#1e293b;color:white;margin-top:15px;}
    select{width:100%;padding:14px;border-radius:12px;margin-top:15px;background:#1e293b;color:white;}

    .generate-btn{width:100%;padding:18px;border:none;border-radius:15px;margin-top:25px;background:linear-gradient(90deg,#2563eb,#7c3aed);color:white;font-size:18px;cursor:pointer;}

    .loading{display:none;margin-top:20px;text-align:center;color:#60a5fa;}

    /* === MUSIC PLAYER (HIDDEN) === */
    audio{
      display:none;
    }

    @media(max-width:900px){
      body{flex-direction:column;}
      .sidebar{width:100%;}
      .grid{grid-template-columns:1fr;}
    }
  </style>

</head>

<body>

  <!-- 🎵 MUSIC PLAYER (NEW - HIDDEN) -->
  <audio id="bgMusic" loop></audio>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">AI SELLER</div>

    <div class="menu">
      <button>Dashboard</button>
      <button>Generate Poster</button>
      <button>Generate Video</button>
      <button>Affiliate Script</button>
      <button>History</button>
      <button>Setting</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top-title">AI Affiliate Generator</div>
    <div class="subtitle">Generate poster, video, subtitle, dan voice AI otomatis.</div>

    <div class="grid">

      <!-- LEFT -->
      <div class="card">

        <h2>Upload Produk</h2>

        <label class="upload-box">
          <input type="file" id="produkInput"/>
          <h3>Upload Foto Produk</h3>
        </label>

        <label class="upload-box">
          <input type="file" id="modelInput"/>
          <h3>Upload Foto Model (Optional)</h3>
        </label>

        <textarea id="prompt" placeholder="Tulis prompt..."></textarea>

        <select id="voice">
          <option>Cewek Affiliate</option>
          <option>Cowok Santai</option>
        </select>

        <select id="style" onchange="previewMusic()">
          <option value="random">Random AI Style</option>
          <option value="tech">Tech / Elektronik</option>
          <option value="soft">Soft / Elegan</option>
          <option value="upbeat">Promo / Hype</option>
        </select>

        <button class="generate-btn" onclick="generateAI()">
          GENERATE AI
        </button>

        <div class="loading" id="loading">
          AI sedang membuat konten...
        </div>

      </div>

      <!-- RIGHT (TETAP) -->
      <div class="card">
        <h2>Hasil AI</h2>

        <div class="result-grid">
          <div class="result-box"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- 🎵 MUSIC LOGIC -->
  <script>

    const musicMap = {
      tech: "assets/music/tech1.mp3",
      soft: "assets/music/soft1.mp3",
      upbeat: "assets/music/upbeat1.mp3",
      random: "assets/music/default.mp3"
    };

    const audio = document.getElementById("bgMusic");

    function playMusic(style){
      const src = musicMap[style] || musicMap.random;
      audio.src = src;
      audio.volume = 0.4;
      audio.play().catch(()=>{});
    }

    function previewMusic(){
      const style = document.getElementById("style").value;
      playMusic(style);
    }

    async function generateAI(){

      const loading = document.getElementById("loading");
      loading.style.display = "block";

      const style = document.getElementById("style").value;

      // 🎵 AUTO MUSIC START
      playMusic(style);

      setTimeout(()=>{
        loading.style.display = "none";
        alert("AI berhasil generate + music aktif!");
      },3000);
    }

  </script>

</body>
</html>
