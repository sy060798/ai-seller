<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Seller Generator</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- 🎵 MUSIC SYSTEM -->
  <audio id="bgMusic" loop></audio>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">AI SELLER</div>

    <div class="menu">
      <button>Dashboard</button>
      <button>Generate Poster</button>
      <button>Generate Video</button>
      <button>Affiliate Script</button>
      <button>History</button>
      <button>Setting</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top-title">AI Affiliate Generator</div>

    <div class="subtitle">
      Generate poster, video, subtitle, dan voice AI otomatis.
    </div>

    <div class="grid">

      <!-- LEFT -->
      <div class="card">

        <h2>Upload Produk</h2>

        <!-- ✅ FIX: ID DIGANTI BIAR MATCH SCRIPT.JS -->
        <label class="upload-box">
          <input type="file" id="imageInput" accept="image/*"/>
          <h3>Upload Foto Produk</h3>
          <p>Klik untuk upload gambar produk</p>
        </label>

        <!-- PREVIEW IMAGE -->
        <img id="previewImage" style="width:100%; max-width:250px; display:none; margin-top:10px; border-radius:10px;" />

        <label class="upload-box">
          <input type="file" id="modelInput"/>
          <h3>Upload Foto Model (Optional)</h3>
          <p>Boleh kosong</p>
        </label>

        <textarea id="prompt" placeholder="Buat video affiliate TikTok..."></textarea>

        <select id="voice">
          <option value="cewek">Cewek Affiliate</option>
          <option value="santai">Cewek Santai</option>
          <option value="cowok">Cowok Santai</option>
          <option value="formal">Formal Indonesia</option>
        </select>

        <select id="style">
          <option value="random">Random AI Style</option>
          <option value="tech">Tech / Elektronik</option>
          <option value="soft">Soft / Elegan</option>
          <option value="upbeat">Promo / Hype</option>
          <option value="industrial">Industrial</option>
        </select>

        <div class="check-group">
          <label><input type="checkbox" checked/> Poster AI</label>
          <label><input type="checkbox" checked/> Video AI</label>
          <label><input type="checkbox" checked/> Subtitle Auto</label>
        </div>

        <button class="generate-btn" onclick="generateAI()">
          GENERATE AI
        </button>

        <div class="loading" id="loading" style="display:none;">
          AI sedang membuat konten...
        </div>

      </div>

      <!-- RIGHT -->
      <div class="card">

        <h2>Hasil AI</h2>

        <div class="result-grid">

          <div class="result-box">
            <img src="https://picsum.photos/500/400?1"/>
            <div class="result-info">
              <h3>Poster Affiliate</h3>
              <button class="download-btn">Download</button>
            </div>
          </div>

          <div class="result-box">
            <img src="https://picsum.photos/500/400?2"/>
            <div class="result-info">
              <h3>Poster Neon</h3>
              <button class="download-btn">Download</button>
            </div>
          </div>

        </div>

        <div class="video-box">
          <h3>Video AI</h3>

          <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video>

          <button class="download-btn">Download Video</button>
        </div>

      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- 🎯 FIX UPLOAD PREVIEW JS -->
  <!-- ========================= -->
  <script>
    const fileInput = document.getElementById("imageInput");

    fileInput?.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = (event) => {
        const img = document.getElementById("previewImage");
        img.src = event.target.result;
        img.style.display = "block";
      };

      reader.readAsDataURL(file);
    });
  </script>

  <!-- ========================= -->
  <!-- 🚀 MAIN SCRIPT (WAJIB) -->
  <!-- ========================= -->
  <script src="./script.js"></script>

</body>
</html>
